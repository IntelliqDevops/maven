# Maven
# Build your Java project and run tests with Apache Maven.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main

pool:
  name: 'agent1'
stages:
  - stage: Download
    displayName: Download
    jobs:
      - job: Dwonload
        displayName: Download
        steps:
          - task: Bash@3
            inputs:
             targetType: 'inline'
             script: 'git clone https://github.com/IntelliqDevops/maven.git'
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Build
        steps:
          - task: Bash@3
            inputs:
             targetType: 'inline'
             script: 'cd /home/azureuser/myagent/_work/2/s;mvn package'
          - task: Bash@3
            inputs:
             targetType: 'inline'
             script: 'cp /home/azureuser/myagent/_work/2/s/webapp/target/webapp.war ~/2/s/'
  - stage: CreateDockerFileandImage
    displayName: CreateDockerFileandImage
    jobs:
      - job: CreateDockerFileandImage
        displayName: CreateDockerFileandImage
        steps:
          - task: Bash@3
            inputs:
             targetType: 'inline'
             script: |
               cat <<EOF > dockerfile
               FROM tomee
               COPY webapp.war /usr/local/tomee/webapps/testapp.war
               EOF
          - task: Bash@3
            inputs:
             targetType: 'inline'
             script: cd /home/azureuser/myagent/_work/2/s;docker build -t intelliqit.azurecr.io/myapp .  
      
  
